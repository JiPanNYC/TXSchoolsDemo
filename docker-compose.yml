services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      NODE_ENV: production
      PORT: 4174
      HOST: 0.0.0.0
      DATABASE_PATH: /app/data/txschools.sqlite
    volumes:
      - txschools-sqlite:/app/data
    expose:
      - "4174"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  txschools-sqlite:
